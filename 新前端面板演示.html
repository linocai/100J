<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>100J · v1.1 新前端面板演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- SF Pro web fallback：使用 Inter（极接近 SF Pro 的几何与字距） -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<!-- Bootstrap Icons：在 Web 上替代 SF Symbols 视觉手感最接近的开源图标集 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<style>
/* ============================================================
   Apple System Tokens（HIG 2025）
   颜色对齐 iOS / macOS 系统语义色；阴影与圆角对齐 Sequoia / iOS 26。
   ============================================================ */
:root {
  /* System colors - light */
  --sys-blue: #007AFF;
  --sys-indigo: #5856D6;
  --sys-purple: #AF52DE;
  --sys-pink: #FF2D55;
  --sys-red: #FF3B30;
  --sys-orange: #FF9500;
  --sys-yellow: #FFCC00;
  --sys-green: #34C759;
  --sys-mint: #00C7BE;
  --sys-teal: #30B0C7;
  --sys-cyan: #32ADE6;
  --sys-brown: #A2845E;
  --sys-gray: #8E8E93;

  /* Semantic surfaces - light */
  --label: #000000;
  --label-secondary: rgba(60,60,67,0.60);
  --label-tertiary: rgba(60,60,67,0.30);
  --label-quaternary: rgba(60,60,67,0.18);

  --bg-base: #F2F2F7;
  --bg-grouped: #F2F2F7;
  --bg-elevated: #FFFFFF;
  --bg-secondary: rgba(118,118,128,0.06);
  --bg-tertiary: rgba(118,118,128,0.12);

  --separator: rgba(60,60,67,0.18);
  --separator-opaque: #C6C6C8;

  --glass-fill: rgba(255,255,255,0.72);
  --glass-stroke: rgba(255,255,255,0.45);
  --glass-shadow: 0 18px 60px -20px rgba(15,23,42,0.18), 0 1px 0 rgba(255,255,255,0.6) inset;

  --window-fill: rgba(246,246,250,0.86);
  --sidebar-fill: rgba(246,246,250,0.72);

  /* Spacing scale (4pt grid) */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-8: 32px;
  --s-10: 40px;

  /* Radius scale */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 28px;
  --r-pill: 999px;

  /* Type scale (matches SwiftUI semantic sizes) */
  --t-largeTitle: 34px;
  --t-title1: 28px;
  --t-title2: 22px;
  --t-title3: 20px;
  --t-headline: 17px;
  --t-body: 15px;
  --t-callout: 14px;
  --t-subheadline: 13px;
  --t-footnote: 12px;
  --t-caption1: 11px;
  --t-caption2: 10px;
}

html[data-theme="dark"] {
  --label: #FFFFFF;
  --label-secondary: rgba(235,235,245,0.60);
  --label-tertiary: rgba(235,235,245,0.30);
  --label-quaternary: rgba(235,235,245,0.18);

  --bg-base: #000000;
  --bg-grouped: #1C1C1E;
  --bg-elevated: #1C1C1E;
  --bg-secondary: rgba(118,118,128,0.32);
  --bg-tertiary: rgba(118,118,128,0.24);

  --separator: rgba(84,84,88,0.65);
  --separator-opaque: #38383A;

  --glass-fill: rgba(28,28,30,0.66);
  --glass-stroke: rgba(255,255,255,0.06);
  --glass-shadow: 0 24px 70px -20px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.04) inset;

  --window-fill: rgba(20,20,22,0.85);
  --sidebar-fill: rgba(28,28,30,0.65);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-base);
  color: var(--label);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.011em;
}

body {
  min-height: 100vh;
  /* Apple-style soft mesh wallpaper */
  background:
    radial-gradient(900px 600px at 8% -8%, rgba(88,86,214,0.16), transparent 60%),
    radial-gradient(800px 600px at 92% 8%, rgba(0,199,190,0.18), transparent 55%),
    radial-gradient(1200px 800px at 50% 110%, rgba(255,149,0,0.12), transparent 60%),
    var(--bg-base);
  background-attachment: fixed;
}

html[data-theme="dark"] body {
  background:
    radial-gradient(900px 600px at 8% -8%, rgba(94,92,230,0.30), transparent 60%),
    radial-gradient(800px 600px at 92% 8%, rgba(0,199,190,0.18), transparent 55%),
    radial-gradient(1200px 800px at 50% 110%, rgba(255,149,0,0.14), transparent 60%),
    #000;
}

/* ============================================================ Controls */
.shell {
  max-width: 1880px;
  margin: 0 auto;
  padding: var(--s-8) var(--s-6) var(--s-10);
}

.topbar {
  position: sticky;
  top: var(--s-4);
  z-index: 50;
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  background: var(--glass-fill);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
          backdrop-filter: saturate(180%) blur(28px);
  border-radius: var(--r-xl);
  border: 1px solid var(--glass-stroke);
  box-shadow: var(--glass-shadow);
  margin-bottom: var(--s-8);
}

.topbar h1 {
  font-size: var(--t-headline);
  font-weight: 600;
  margin: 0 var(--s-3) 0 var(--s-2);
  letter-spacing: -0.02em;
}

.topbar .brand {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--sys-indigo), var(--sys-purple));
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 14px;
  box-shadow: 0 4px 10px rgba(88,86,214,0.4);
}

.seg {
  display: inline-flex;
  background: var(--bg-secondary);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 2px;
}
.seg button {
  appearance: none; border: 0; cursor: pointer;
  background: transparent;
  color: var(--label-secondary);
  font: inherit;
  font-size: var(--t-subheadline);
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all .18s ease;
}
.seg button.on {
  background: var(--bg-elevated);
  color: var(--label);
  box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
}
html[data-theme="dark"] .seg button.on {
  background: rgba(118,118,128,0.36);
  box-shadow: none;
}

.icon-btn {
  appearance: none; border: 0; cursor: pointer;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-secondary);
  color: var(--label);
  display: grid; place-items: center;
  font-size: 14px;
  transition: background .18s ease;
}
.icon-btn:hover { background: var(--bg-tertiary); }
.spacer { flex: 1; }

.caption {
  color: var(--label-secondary);
  font-size: var(--t-caption1);
}

/* ============================================================ Stage */
.stage {
  display: grid;
  grid-template-columns: minmax(960px, 1.55fr) minmax(360px, 0.6fr);
  gap: var(--s-8);
  align-items: start;
}

@media (max-width: 1500px) {
  .stage { grid-template-columns: 1fr; }
}

/* ============================================================ macOS Window */
.mac-window {
  background: var(--window-fill);
  border-radius: 16px;
  border: 1px solid var(--glass-stroke);
  box-shadow:
    0 50px 120px -30px rgba(15,23,42,0.45),
    0 16px 40px -12px rgba(15,23,42,0.25),
    0 0 0 0.5px rgba(0,0,0,0.06);
  overflow: hidden;
  -webkit-backdrop-filter: saturate(180%) blur(36px);
          backdrop-filter: saturate(180%) blur(36px);
}

.mac-titlebar {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  height: 44px;
  padding: 0 var(--s-4);
  border-bottom: 0.5px solid var(--separator);
  background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
}

html[data-theme="dark"] .mac-titlebar {
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0));
}

.traffic { display: flex; gap: 8px; }
.traffic span {
  width: 12px; height: 12px; border-radius: 50%;
  display: block;
  box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18);
}
.traffic .close { background: #FF5F57; }
.traffic .min { background: #FEBC2E; }
.traffic .max { background: #28C840; }

.mac-title {
  font-size: var(--t-subheadline);
  font-weight: 600;
  color: var(--label-secondary);
  margin-left: var(--s-2);
  letter-spacing: -0.01em;
}

.mac-toolbar {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: var(--s-2);
}

.mac-toolbar .pill-search {
  background: var(--bg-secondary);
  border-radius: var(--r-pill);
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  color: var(--label-secondary);
  font-size: var(--t-subheadline);
  min-width: 240px;
}

.mac-body {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 660px;
}

/* ----- Sidebar ----- */
.mac-sidebar {
  background: var(--sidebar-fill);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
          backdrop-filter: saturate(180%) blur(20px);
  border-right: 0.5px solid var(--separator);
  padding: var(--s-3) var(--s-3) var(--s-4);
  display: flex; flex-direction: column;
}

.brand-row {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-3) var(--s-4);
}
.brand-row .mark {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--sys-indigo), var(--sys-purple));
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 14px;
  box-shadow: 0 6px 14px -2px rgba(88,86,214,0.45);
}
.brand-row .title { font-size: var(--t-headline); font-weight: 600; letter-spacing: -0.02em; }
.brand-row .sub { font-size: 10px; color: var(--label-tertiary); margin-top: 1px; }

.nav-section {
  margin-top: var(--s-3);
  padding: 0 var(--s-2);
}
.nav-section .label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--label-tertiary);
  padding: 0 var(--s-2) var(--s-2);
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 8px;
  color: var(--label-secondary);
  font-size: var(--t-body);
  font-weight: 500;
  cursor: pointer;
  transition: background .14s ease, color .14s ease;
  position: relative;
}
.nav-item i { font-size: 15px; width: 22px; text-align: center; }
.nav-item .count {
  margin-left: auto;
  font-size: var(--t-caption1);
  font-weight: 600;
  color: var(--label-tertiary);
}
.nav-item:hover { background: var(--bg-secondary); color: var(--label); }
.nav-item.on {
  background: color-mix(in oklab, var(--accent, var(--sys-blue)) 14%, transparent);
  color: var(--label);
}
.nav-item.on i, .nav-item.on .count {
  color: var(--accent, var(--sys-blue));
}

.sidebar-foot {
  margin-top: auto;
  padding: var(--s-3) var(--s-2);
  border-top: 0.5px solid var(--separator);
  display: flex; align-items: center; gap: var(--s-3);
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #FF9500, #FF2D55);
  color: white;
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
}
.foot-name { font-size: var(--t-subheadline); font-weight: 600; }
.foot-sub { font-size: var(--t-caption1); color: var(--label-tertiary); }
.sidebar-foot .icon-btn { margin-left: auto; background: transparent; }

/* ----- Main content area ----- */
.mac-main {
  padding: var(--s-6) var(--s-8);
  overflow: hidden;
  position: relative;
}

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-6);
}
.eyebrow {
  font-size: var(--t-caption1);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent, var(--sys-blue));
}
.page-title {
  font-size: var(--t-title1);
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: 4px 0 6px;
}
.page-sub {
  font-size: var(--t-callout);
  color: var(--label-secondary);
  max-width: 60ch;
  line-height: 1.45;
}

/* Primary button — `.borderedProminent` look */
.btn-prom {
  appearance: none; border: 0; cursor: pointer;
  background: linear-gradient(180deg, var(--accent, var(--sys-blue)), color-mix(in oklab, var(--accent, var(--sys-blue)) 80%, black));
  color: white;
  font-size: var(--t-body);
  font-weight: 600;
  padding: 9px 16px;
  border-radius: 10px;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 16px -6px color-mix(in oklab, var(--accent, var(--sys-blue)) 70%, transparent);
}
.btn-prom:hover { filter: brightness(1.06); }
.btn-ghost {
  appearance: none; border: 0; cursor: pointer;
  background: var(--bg-secondary);
  color: var(--label);
  font-size: var(--t-body); font-weight: 500;
  padding: 8px 12px;
  border-radius: 10px;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-ghost:hover { background: var(--bg-tertiary); }

/* Group / card */
.group {
  background: var(--bg-elevated);
  border-radius: var(--r-md);
  border: 0.5px solid var(--separator);
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.04), 0 12px 30px -20px rgba(15,23,42,0.12);
}
html[data-theme="dark"] .group {
  background: rgba(40,40,42,0.72);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
          backdrop-filter: saturate(180%) blur(20px);
  box-shadow: 0 0.5px 0 rgba(255,255,255,0.04), 0 18px 40px -20px rgba(0,0,0,0.55);
}

.group-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 10px;
}
.group-head h3 {
  font-size: var(--t-headline);
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0;
}
.group-head .meta {
  margin-left: auto;
  font-size: var(--t-caption1);
  color: var(--label-tertiary);
}

.row {
  display: flex; align-items: center; gap: var(--s-3);
  padding: 11px 16px;
  border-top: 0.5px solid var(--separator);
}
.row:first-of-type { border-top: 0; }
.row .leading {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--label-secondary);
  background: transparent;
  border: 1.5px solid var(--label-tertiary);
  font-size: 11px;
}
.row.done .leading { background: var(--sys-blue); border-color: var(--sys-blue); color: white; }
.row.done .title { color: var(--label-tertiary); text-decoration: line-through; }
.row .body { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.row .title { font-size: var(--t-body); font-weight: 500; letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .sub { font-size: var(--t-footnote); color: var(--label-secondary); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .tail { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* Tag / pill */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--r-pill);
  background: color-mix(in oklab, var(--c, var(--sys-blue)) 14%, transparent);
  color: var(--c, var(--sys-blue));
  white-space: nowrap;
}
.tag.solid {
  background: var(--c, var(--sys-blue));
  color: white;
}

/* segmented page tabs */
.tabs {
  display: inline-flex; background: var(--bg-secondary);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 2px;
  margin-bottom: var(--s-5);
}
.tabs button {
  appearance: none; border: 0; cursor: pointer;
  background: transparent;
  color: var(--label-secondary);
  font: inherit;
  font-size: var(--t-subheadline);
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 8px;
  display: inline-flex; align-items: center; gap: 6px;
}
.tabs button.on {
  background: var(--bg-elevated);
  color: var(--label);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
html[data-theme="dark"] .tabs button.on { background: rgba(118,118,128,0.36); box-shadow: none; }

/* Today layout — 3 columns of equal weight */
.today-grid {
  display: grid;
  grid-template-columns: 1.05fr 1fr 0.95fr;
  gap: var(--s-5);
}
@media (max-width: 1400px) { .today-grid { grid-template-columns: 1fr 1fr; } }

/* Metric strip */
.metric-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--separator);
  border-radius: var(--r-md);
  overflow: hidden;
  margin-bottom: var(--s-5);
  border: 0.5px solid var(--separator);
}
.metric {
  background: var(--bg-elevated);
  padding: 14px 18px;
}
html[data-theme="dark"] .metric { background: rgba(40,40,42,0.72); }
.metric .num {
  font-size: var(--t-title2);
  font-weight: 700;
  letter-spacing: -0.02em;
}
.metric .lbl {
  font-size: var(--t-footnote);
  color: var(--label-secondary);
  margin-top: 2px;
}
.metric .num.indigo { color: var(--sys-indigo); }
.metric .num.green { color: var(--sys-green); }
.metric .num.orange { color: var(--sys-orange); }
.metric .num.purple { color: var(--sys-purple); }

/* Calendar grid (lightweight) */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 8px;
}
.cal-grid .dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--label-tertiary);
  padding: 4px 0;
  letter-spacing: 0.08em;
}
.cal-grid .day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  font-size: var(--t-callout);
  color: var(--label);
  position: relative;
  cursor: pointer;
}
.cal-grid .day.out { color: var(--label-tertiary); }
.cal-grid .day:hover { background: var(--bg-secondary); }
.cal-grid .day .dot {
  position: absolute;
  bottom: 4px;
  width: 4px; height: 4px; border-radius: 50%;
}
.cal-grid .day.sel {
  background: var(--sys-orange);
  color: white;
  font-weight: 600;
}
.cal-grid .day.today {
  color: var(--sys-orange);
  font-weight: 700;
}

/* Agent chat */
.chat-bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: var(--t-body);
  line-height: 1.4;
  max-width: 80%;
}
.chat-bubble.user {
  background: var(--sys-purple);
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}
.chat-bubble.bot {
  background: var(--bg-secondary);
  color: var(--label);
  border-bottom-left-radius: 6px;
}

/* ============================================================ iPhone */
.iphone {
  width: 393px;
  height: 852px;
  border-radius: 56px;
  background: linear-gradient(180deg, #1f1f24, #0a0a0d);
  padding: 12px;
  box-shadow:
    0 60px 120px -30px rgba(0,0,0,0.6),
    0 10px 30px -10px rgba(0,0,0,0.4),
    0 0 0 1.5px rgba(255,255,255,0.06) inset;
  margin: 0 auto;
}
.iphone-screen {
  width: 100%; height: 100%;
  background: var(--bg-grouped);
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
}

/* Status bar */
.status-bar {
  height: 54px;
  padding: 18px 28px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  color: var(--label);
  position: relative;
  z-index: 2;
}
.dynamic-island {
  position: absolute;
  top: 11px; left: 50%;
  transform: translateX(-50%);
  width: 124px; height: 36px;
  background: #000;
  border-radius: 22px;
}
.status-bar .right { display: flex; align-items: center; gap: 5px; font-size: 14px; }
.status-bar .right i { font-size: 12px; }

/* iOS scroll content */
.ios-scroll {
  flex: 1;
  overflow-y: auto;

function renderCalendar() {
  // Build May 2026 grid
  // 2026-05-01 is Friday (5).
  const dows = ["日","一","二","三","四","五","六"];
  const days = [];
  // previous month tail
  for (let i = 0; i < 5; i++) days.push({ d: 26 + i, out: true });
  for (let d = 1; d <= 31; d++) days.push({ d, out: false });
  for (let i = 1; i <= 9; i++) days.push({ d: i, out: true });

  const events = { 21: "today", 24: "sel", 27: "dot", 30: "dot" };

  return `
    <div class="page-head" style="--accent:var(--sys-orange)">
      <div>
        <div class="eyebrow">日历</div>
        <h2 class="page-title">2026 年 5 月</h2>
        <p class="page-sub">All / 个人 / 公司 / 项目 四个过滤；只显示固定时间事项，不展示弹性待办。</p>
      </div>
      <div style="display:flex;gap:10px">
        <div class="seg"><button class="on">All</button><button>个人</button><button>公司</button><button>项目</button></div>

      </div>
    </div>

    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px">
      <div class="group">
        <div class="group-head">
          <h3>月视图</h3>
          <span class="meta">中文起始日 · 周日</span>
        </div>
        <div class="cal-grid">
          ${dows.map(d => `<div class="dow">${d}</div>`).join("")}
          ${days.map(x => {
            const cls = [x.out ? "out" : ""];
            const ev = events[x.d];
            if (!x.out && ev) cls.push(ev);
            const dot = (!x.out && ev === "dot") ? `<span class="dot" style="background:var(--sys-orange)"></span>` : "";
            return `<div class="day ${cls.join(" ")}">${x.d}${dot}</div>`;

        <div class="group-head">
          <h3>5 月 24 日 · 星期日</h3>
          <span class="meta">3 项</span>
        </div>
        ${[
          { time: "全天", title: "妈妈生日",      sub: "纪念日 · 个人", color: "var(--sys-pink)" },
          { time: "11:00", title: "家庭午餐",     sub: "外滩 · 90 分钟", color: "var(--sys-mint)" },
          { time: "16:00", title: "Sprint 计划",  sub: "Zoom · 60 分钟", color: "var(--sys-indigo)" },

const MAC_RENDERS = {
  login: { sidebar: false, body: renderLogin },
  today: { sidebar: true,  body: renderToday },
  plan: { sidebar: true,  body: renderPlan },
  calendar: { sidebar: true, body: renderCalendar },
  agent: { sidebar: true,  body: renderAgent },
  composer: { sidebar: true, body: renderToday, composer: true },
};

const IOS_RENDERS = {
  login: renderIosLogin,
  today: renderIosToday,
  plan: renderIosPlan,
  calendar: renderIosCalendar,
  agent: renderIosAgent,
  composer: renderIosComposer,
};

function goScene(scene) {
  CURRENT_SCENE = scene;
  // Top seg
  document.querySelectorAll("#scene-seg button").forEach(b => {
    b.classList.toggle("on", b.dataset.scene === scene);
  });
  // mac
  const cfg = MAC_RENDERS[scene] || MAC_RENDERS.today;
  const sb = document.getElementById("mac-sidebar");
  const body = document.getElementById("mac-main");
  const scn = document.getElementById("mac-scene");
  if (cfg.sidebar) {
    scn.style.gridTemplateColumns = "232px 1fr";
    sb.style.display = "flex";
    renderSidebar(scene === "composer" ? "today" : scene);
  } else {
    scn.style.gridTemplateColumns = "1fr";
    sb.style.display = "none";
  }
  body.innerHTML = cfg.body();
  // composer overlay
  document.getElementById("composer-overlay").classList.toggle("show", !!cfg.composer);

  // iphone
  const ios = document.getElementById("ios-scroll");
  ios.innerHTML = IOS_RENDERS[scene]();
  // tab bar
  renderIosTabbar(scene);
}

function renderIosTabbar(scene) {
  const tabbar = document.getElementById("ios-tabbar");
  if (scene === "login") { tabbar.style.display = "none"; return; }
  tabbar.style.display = "flex";
  const tabs = [
    { id: "today", icon: "sun-fill", label: "Today" },
    { id: "plan", icon: "kanban", label: "Plan" },
    { id: "calendar", icon: "calendar3", label: "Calendar" },
    { id: "agent", icon: "stars", label: "Agent" },
  ];
  tabbar.innerHTML = tabs.map(t => `
    <button class="${(scene === t.id || (scene === 'composer' && t.id === 'today')) ? 'on' : ''}" data-go="${t.id}">
      <i class="bi bi-${t.icon}"></i><span>${t.label}</span>
    </button>
  `).join("");
  tabbar.querySelectorAll("[data-go]").forEach(el => {
    el.addEventListener("click", () => goScene(el.dataset.go));
  });
}

function renderComposerSuggest() {
  const wrap = document.getElementById("composer-suggest");
  wrap.innerHTML = COMPOSER_SUGGEST.map((s, i) => `
    <div class="item ${i === 0 ? 'on' : ''}">
      <i class="bi bi-${s.icon}"></i>
      <span>${s.label}</span>
      <span class="hint">${s.hint}</span>
    </div>
  `).join("");
}

/* ============================================================
   Theme toggle
   ============================================================ */
function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.querySelectorAll("#theme-seg button").forEach(b => {
    b.classList.toggle("on", b.dataset.theme === theme);
  });
}

/* ============================================================
   Init
   ============================================================ */
function init() {
  // scene buttons
  document.querySelectorAll("#scene-seg button").forEach(b => {
    b.addEventListener("click", () => goScene(b.dataset.scene));
  });
  // theme buttons
  document.querySelectorAll("#theme-seg button").forEach(b => {
    b.addEventListener("click", () => setTheme(b.dataset.theme));
  });
  // ⌘K
  document.addEventListener("keydown", e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
      e.preventDefault();
      goScene("composer");
    }
    if (e.key === "Escape" && CURRENT_SCENE === "composer") {
      goScene("today");
    }
  });
  // close composer on overlay click
  document.getElementById("composer-overlay").addEventListener("click", e => {
    if (e.target.id === "composer-overlay") goScene("today");
  });
  renderComposerSuggest();
  setTheme("light");
  goScene("today");
}

init();
</script>
</body>
</html>
