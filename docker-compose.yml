services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${ONEJ_ENV_FILE:-./backend/.env}
    volumes:
      - 100j-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ONEJ_ENV_FILE:-./backend/.env}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-100j}:${POSTGRES_PASSWORD:-100j}@db:5432/${POSTGRES_DB:-100j}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ONEJ_API_PORT:-8020}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  100j-postgres-data:
